<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viky AI</title>
  <meta name="description" content="Viky AI - Your premium writing assistant, image creator, and chat companion directly in your browser.">
  <meta property="og:title" content="Viky AI - Extension Popup">
  <meta property="og:description" content="Viky AI is a powerful Chrome extension featuring translation, transcription, chat, image generation, and smart writing assistance.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ambient-glow"></div>
  <div class="card" aria-label="Viky AI Card">
    <div class="card-header">
      <div class="brand">
        <div class="logo-ring">
          <img src="icons/logo_main_neon.png" alt="Viky AI" class="logo-img">
        </div>
        <div class="brand-text">
          <h1>Viky AI</h1>
          <span class="version">v1.1</span>
        </div>
      </div>
      <div class="status-dot" id="status-dot" title="Checking status..."></div>
    </div>

    <p class="tagline">Premium writing assistant and creative studio.</p>

    <div class="quick-actions">
      <button id="open-sidepanel" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Open Side Panel
      </button>

      <button id="toggle-theme-mini" class="btn btn-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <span id="theme-label">Dark Mode</span>
      </button>
    </div>

    <div class="feature-strip">
      <div class="feature-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Write</span>
      </div>
      <div class="feature-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Create</span>
      </div>
      <div class="feature-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Refine</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
