<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microphone Permission - Viky AI</title>
  <meta name="description" content="Grant microphone permission to Viky AI to enable high-quality speech-to-text and audio transcription.">
  <meta property="og:title" content="Viky AI - Microphone Permission">
  <meta property="og:description" content="Enable microphone recording for Viky AI speech-to-text transcription.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #0b0f19;
      --bg-card: #111827;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent: #00ff9d;
      --accent-glow: rgba(0, 255, 157, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 440px;
      width: 90%;
      text-align: center;
      padding: 40px 30px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 80px rgba(0, 255, 157, 0.03);
      animation: floatIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 28px;
    }

    .mic-outer-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 2px solid var(--accent);
      border-radius: 50%;
      animation: pulseRing 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
    }

    .logo-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 60px;
      height: 60px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
    }

    .logo-badge svg {
      color: #0b0f19;
    }

    @keyframes pulseRing {
      0% {
        transform: scale(0.9);
        opacity: 0.8;
      }
      70% {
        transform: scale(1.3);
        opacity: 0;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    .status-alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      margin-bottom: 24px;
      display: none;
      text-align: left;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      color: #0b0f19;
      background-color: var(--accent);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(0, 255, 157, 0.25);
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 255, 157, 0.4);
    }

    .action-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="mic-outer-ring"></div>
      <div class="logo-badge">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </div>

    <h1>Microphone Permission</h1>
    <p id="description-text">Viky AI needs access to your microphone to transcribe speech directly into text. Please select <strong>Allow</strong> when requested by the browser.</p>

    <div class="status-alert" id="status-alert"></div>

    <button id="request-btn" class="action-btn" aria-label="Request microphone access">Request Access</button>
  </div>

  <script src="permission.js"></script>
</body>
</html>
